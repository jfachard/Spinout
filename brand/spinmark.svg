<svg viewBox="0 0 104 118" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Spinout spinmark">
  <title>Spinout spinmark</title>
  <!-- sticker shadow -->
  <g transform="translate(56 68)">
    <circle r="52" fill="#3A2A24"/>
  </g>
  <!-- pointer -->
  <polygon points="52,0 41,18 63,18" fill="#3A2A24"/>
  <!-- wheel -->
  <g transform="translate(52 64)">
    <g transform="scale(0.26)" stroke="#3A2A24" stroke-width="14">
      <path d="M0 0 L0 -200 A200 200 0 0 1 173 -100 Z" fill="#E8643C"/>
      <path d="M0 0 L173 -100 A200 200 0 0 1 173 100 Z" fill="#7A9A52"/>
      <path d="M0 0 L173 100 A200 200 0 0 1 0 200 Z" fill="#F2A03D"/>
      <path d="M0 0 L0 200 A200 200 0 0 1 -173 100 Z" fill="#6F94A8"/>
      <path d="M0 0 L-173 100 A200 200 0 0 1 -173 -100 Z" fill="#D1688A"/>
      <path d="M0 0 L-173 -100 A200 200 0 0 1 0 -200 Z" fill="#C98A3A"/>
    </g>
    <circle r="52" fill="none" stroke="#3A2A24" stroke-width="3.5"/>
    <circle r="17" fill="#FBF3E4" stroke="#3A2A24" stroke-width="3"/>
  </g>
</svg>
